<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camping Availability — Summer 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           margin: 0; padding: 20px; background: #f5f5f5; color: #222; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .meta { color: #666; font-size: 0.85rem; margin-bottom: 20px; }

    .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.8rem; margin-bottom: 16px; }
    .legend span { padding: 2px 10px; border-radius: 4px; }
    .leg-avail   { background: #dcfce7; color: #166534; }
    .leg-partial { background: #fef9c3; color: #854d0e; }
    .leg-taken   { background: #fee2e2; color: #991b1b; }
    .leg-blackout { background: #fafafa; color: #999; border: 1px solid #e5e5e5; }

    .filters { display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
               background: #fff; padding: 12px 16px; border-radius: 8px;
               box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 16px; }
    .filters label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; cursor: pointer; }
    .filters input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

    .tab-bar { display: flex; gap: 4px; }
    .tab-btn { padding: 8px 18px; border: none; border-radius: 6px 6px 0 0;
               background: #ddd; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .tab-btn.active { background: #fff; box-shadow: 0 -1px 3px rgba(0,0,0,.1); }

    .tab-panel { display: none; background: #fff; border-radius: 0 6px 6px 6px;
                 box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 16px; }
    .tab-panel.active { display: block; }

    .cg-header { font-size: 0.85rem; color: #555; margin-bottom: 12px; }
    .cg-header a { color: #2563eb; }
    .pair-badge { background: #e0f2fe; color: #0369a1; padding: 2px 8px;
                  border-radius: 4px; font-size: 0.82rem; font-weight: 600; }

    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; font-size: 0.82rem; white-space: nowrap; table-layout: fixed; }
    th { background: #f0f0f0; padding: 6px 10px; text-align: center;
         border: 1px solid #ddd; position: sticky; top: 0; z-index: 1; }
    td { padding: 5px 8px; border: 1px solid #e5e5e5; text-align: center; }
    .weekend-col { text-align: left; font-weight: 500; width: 110px; }
    .blackout-col { width: 170px; }
    .pair-col { background: #f0f9ff; font-weight: 600; width: 100px; }
    .pref-col { background: #fefce8; width: 42px; }
    .site-col { width: 38px; }
    .bo-cell { font-size: 0.75rem; color: #92400e; }

    .blackout-row td { background: #fafafa; color: #999; }
    .blackout-row .bo-cell { color: #b45309; font-style: italic; }

    .avail   { background: #dcfce7; color: #166534; font-weight: 600; }
    .partial { background: #fef9c3; color: #854d0e; }
    .taken   { background: #fee2e2; color: #991b1b; }
    .unknown { color: #aaa; }

    tr.hidden { display: none; }

    .blackout-ref { margin-top: 24px; }
    .blackout-ref h3 { font-size: 1rem; margin-bottom: 8px; }
    .blackout-ref table { width: auto; }
    .blackout-ref td, .blackout-ref th { text-align: left; padding: 4px 12px; }
  </style>
</head>
<body>

<h1>Camping Availability — Summer 2026</h1>
<p class="meta" id="meta">Loading...</p>

<div class="legend">
  <span class="leg-avail">✓ available both nights</span>
  <span class="leg-partial">~ one night only</span>
  <span class="leg-taken">✗ not available</span>
  <span class="leg-blackout">blackout weekend</span>
</div>

<div class="filters">
  <strong>Filters:</strong>
  <label><input type="checkbox" id="hideBlackouts" onchange="applyFilters()"> Hide blackout weekends</label>
  <label><input type="checkbox" id="availableOnly" onchange="applyFilters()"> Show only weekends with a fully available pair</label>
  <label><input type="checkbox" id="pairsOnly" onchange="toggleSiteCols()"> Preferred groupings only</label>
</div>

<div class="tab-bar" id="tab-bar"></div>
<div id="panels"></div>

<div class="blackout-ref">
  <h3>Blackout Dates</h3>
  <table>
    <thead><tr><th>Dates</th><th>Reason</th></tr></thead>
    <tbody id="blackout-tbody"></tbody>
  </table>
</div>

<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtDate(ymd) {
    const [, m, d] = ymd.split('-').map(Number);
    return `${MONTHS[m - 1]} ${d}`;
  }

  function siteSort(a, b) {
    const na = parseInt(a), nb = parseInt(b);
    return (!isNaN(na) && !isNaN(nb)) ? na - nb : a.localeCompare(b);
  }

  function nightStatus(siteAvail, ymd) {
    const val = ((siteAvail || {})[ymd + 'T00:00:00Z'] || '?').toLowerCase();
    if (val === 'available') return 'A';
    if (val === '?') return '?';
    return 'X';
  }

  function bothNights(siteAvail, fri, sat) {
    const f = nightStatus(siteAvail, fri);
    const s = nightStatus(siteAvail, sat);
    if (f === 'A' && s === 'A') return '✓';
    if (f === 'A' || s === 'A') return '~';
    if (f === '?' && s === '?') return '?';
    return '✗';
  }

  function pairStatus(sites, a, b, fri, sat) {
    const ra = bothNights(sites[a], fri, sat);
    const rb = bothNights(sites[b], fri, sat);
    if (ra === '✓' && rb === '✓') return '✓ both';
    if (ra === '✓') return `✓ ${a} only`;
    if (rb === '✓') return `✓ ${b} only`;
    if (ra === '~' || rb === '~') return '~ partial';
    return '✗';
  }

  function cellCls(v) {
    if (v.startsWith('✓')) return 'avail';
    if (v.startsWith('~')) return 'partial';
    if (v === '✗') return 'taken';
    return 'unknown';
  }

  function getBlackout(ymd, blackouts) {
    for (const bo of blackouts) {
      if (ymd >= bo.start && ymd <= bo.end) return bo.reason;
    }
    return null;
  }

  function buildPanel(cg, weekends, blackouts) {
    const { url, preferred_pairs, preferred_sites, sites } = cg;
    const allNums = Object.keys(sites).sort(siteSort);

    const pairBadges = preferred_pairs
      .map(([a, b]) => `<span class="pair-badge">${a}+${b}</span>`)
      .join(' &nbsp;·&nbsp; ');

    const pairThs = preferred_pairs.map(([a, b]) => `<th class="pair-col">${a}+${b}</th>`).join('');
    const siteThs = allNums.map(s =>
      `<th class="${preferred_sites.includes(s) ? 'pref-col' : 'site-col'} site-data">${s}</th>`
    ).join('');

    const rows = weekends.map(({ fri, sat, sun }) => {
      const bo = getBlackout(fri, blackouts) || getBlackout(sat, blackouts);
      const label = `${fmtDate(fri)}–${fmtDate(sun)}`;

      const pairVals = preferred_pairs.map(([a, b]) => pairStatus(sites, a, b, fri, sat));
      const siteVals = allNums.map(s => bothNights(sites[s], fri, sat));
      const hasAvail = pairVals.some(v => v === '✓ both');

      const pairTds = pairVals.map(v => `<td class="${cellCls(v)}">${v}</td>`).join('');
      const siteTds = siteVals.map(v => `<td class="${cellCls(v)} site-data">${v}</td>`).join('');

      return `<tr class="${bo ? 'blackout-row' : ''}"
                  data-blackout="${bo ? 1 : 0}"
                  data-available="${hasAvail ? 1 : 0}">
        <td class="weekend-col">${label}</td>
        <td class="bo-cell">${bo || ''}</td>
        ${pairTds}${siteTds}
      </tr>`;
    }).join('');

    return `
      <div class="cg-header">
        <a href="${url}" target="_blank">recreation.gov →</a>
        &nbsp;&nbsp; Preferred pairs: ${pairBadges}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th class="weekend-col">Weekend</th><th class="blackout-col">Blackout</th>${pairThs}${siteThs}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function render(data) {
    const { updated, blackouts, campgrounds, weekends } = data;

    document.getElementById('meta').textContent =
      `Last updated: ${updated} · Re-run check-camping.py to refresh`;

    document.getElementById('blackout-tbody').innerHTML = blackouts.map(bo =>
      `<tr><td>${fmtDate(bo.start)}–${fmtDate(bo.end)}</td><td>${bo.reason}</td></tr>`
    ).join('');

    const tabBar = document.getElementById('tab-bar');
    const panels = document.getElementById('panels');

    Object.entries(campgrounds).forEach(([name, cg], i) => {
      const id = `tab${i}`;
      const btn = document.createElement('button');
      btn.className = `tab-btn ${i === 0 ? 'active' : ''}`;
      btn.textContent = name;
      btn.onclick = (e) => showTab(id, e.currentTarget);
      tabBar.appendChild(btn);

      const panel = document.createElement('div');
      panel.id = id;
      panel.className = `tab-panel ${i === 0 ? 'active' : ''}`;
      panel.innerHTML = buildPanel(cg, weekends, blackouts);
      panels.appendChild(panel);
    });
  }

  function showTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    applyFilters();
  }

  function toggleSiteCols() {
    const hide = document.getElementById('pairsOnly').checked;
    document.querySelectorAll('.site-data').forEach(el => {
      el.style.display = hide ? 'none' : '';
    });
  }

  function applyFilters() {
    const hideBO = document.getElementById('hideBlackouts').checked;
    const availOnly = document.getElementById('availableOnly').checked;
    document.querySelectorAll('.tab-panel.active tbody tr').forEach(row => {
      const isBO = row.dataset.blackout === '1';
      const hasAvail = row.dataset.available === '1';
      row.classList.toggle('hidden', (hideBO && isBO) || (availOnly && !hasAvail));
    });
  }

  async function init() {
    try {
      const resp = await fetch('./camping-availability.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      render(await resp.json());
    } catch (e) {
      document.getElementById('meta').innerHTML =
        `<span style="color:red">Failed to load data: ${e.message}</span>`;
    }
  }

  init();
</script>
</body>
</html>
